{% extends 'user/base.html' %}

{% block account_content %}
<div class="dashboard-header">
    <h1 class="dashboard-title">Change Password</h1>
    <p class="dashboard-subtitle">Update your password details to secure your account.</p>
</div>

<div class="profile-card">
    <div class="profile-card-header">
        <h2 class="profile-card-title">Update Password</h2>
    </div>

    <form action="{{ url_for('user.change_password') }}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-grid" style="grid-template-columns: 1fr; max-width: 500px;">
            <div class="form-group">
                <label class="form-label" for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" class="form-input" 
                       placeholder="Enter your current password" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" class="form-input" 
                       placeholder="Min 6 characters" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" 
                       placeholder="Confirm your new password" required>
            </div>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn btn-fill" style="padding: 0.75rem 2rem;">Update Password</button>
        </div>
    </form>
</div>
{% endblock %}
