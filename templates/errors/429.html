{% extends "base.html" %}
{% block title %}429 Too Many Requests | alphatex{% endblock %}
{% block content %}
<style>
.error-page {
    min-height: 70vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 4rem 2rem; gap: 1.5rem;
}
.error-code {
    font-family: var(--font-h); font-size: clamp(5rem, 15vw, 9rem);
    font-weight: 200; letter-spacing: .1em; line-height: 1;
    background: linear-gradient(135deg, var(--accent), hsl(30,90%,65%));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: fadeUp .6s ease;
}
.error-icon { font-size: 3.5rem; color: var(--accent); animation: spin 3s linear infinite; }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
.error-title { font-family: var(--font-h); font-weight: 300; font-size: 1.8rem; animation: fadeUp .6s .1s ease both; }
.error-msg { color: var(--text-secondary); font-size: .95rem; max-width: 420px; line-height: 1.7; animation: fadeUp .6s .2s ease both; }
.countdown { font-size: 1.1rem; font-weight: 700; color: var(--accent); animation: fadeUp .6s .25s ease both; }
.error-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; animation: fadeUp .6s .3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
</style>
<div class="error-page">
    <div class="error-icon"><i class="fa-solid fa-clock"></i></div>
    <div class="error-code">429</div>
    <h1 class="error-title">Slow Down!</h1>
    <p class="error-msg">You've made too many requests in a short time. Please wait a moment before trying again.</p>
    <div class="countdown" id="countdown">Retry in <span id="secs">60</span>s</div>
    <div class="error-actions">
        <a href="{{ url_for('shop.index') }}" class="btn" style="padding:.9rem 2rem;" id="retry-btn">← Go Home</a>
    </div>
</div>
<script>
let secs = 60;
const el = document.getElementById('secs');
const cd = document.getElementById('countdown');
const timer = setInterval(() => {
    secs--;
    el.textContent = secs;
    if (secs <= 0) {
        clearInterval(timer);
        cd.textContent = 'You can retry now.';
    }
}, 1000);
</script>
{% endblock %}
