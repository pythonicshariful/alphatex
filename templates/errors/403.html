{% extends "base.html" %}
{% block title %}403 Forbidden | alphatex{% endblock %}
{% block content %}
<style>
.error-page {
    min-height: 70vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 4rem 2rem; gap: 1.5rem;
}
.error-code {
    font-family: var(--font-h); font-size: clamp(5rem, 15vw, 9rem);
    font-weight: 200; letter-spacing: .1em; line-height: 1;
    background: linear-gradient(135deg, var(--accent), hsl(30,90%,65%));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: fadeUp .6s ease;
}
.error-icon {
    font-size: 3.5rem; color: var(--accent);
    animation: pulse 2s ease infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.error-title { font-family: var(--font-h); font-weight: 300; font-size: 1.8rem; animation: fadeUp .6s .1s ease both; }
.error-msg { color: var(--text-secondary); font-size: .95rem; max-width: 420px; line-height: 1.7; animation: fadeUp .6s .2s ease both; }
.error-actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; animation: fadeUp .6s .3s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
</style>
<div class="error-page">
    <div class="error-icon"><i class="fa-solid fa-shield-halved"></i></div>
    <div class="error-code">403</div>
    <h1 class="error-title">Access Denied</h1>
    <p class="error-msg">Our security systems have flagged this request. If you believe this is a mistake, please contact support.</p>
    <div class="error-actions">
        <a href="{{ url_for('shop.index') }}" class="btn" style="padding:.9rem 2rem;">← Go Home</a>
        <a href="{{ url_for('shop.contact') }}" class="btn" style="padding:.9rem 2rem; background:transparent; border:1px solid var(--border); color:var(--text);">Contact Support</a>
    </div>
</div>
{% endblock %}
