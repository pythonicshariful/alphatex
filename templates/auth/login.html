{% extends "base.html" %}
{% block title %}Login | alphatex{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card reveal">
        <div class="auth-logo"><a href="/" style="display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;"><img src="/static/images/logo.webp" alt="alphatex" style="height:32px;width:auto;"><span style="font-family:Century Gothic,sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:.12em;color:var(--accent);">alphatex</span></a></div>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account</p>

        <!-- Tab switcher -->
        <div class="auth-tabs">
            <button class="auth-tab active" data-tab="otp">OTP Login</button>
            <button class="auth-tab" data-tab="password">Password</button>
        </div>

        <!-- OTP Login -->
        <div class="auth-tab-content active" id="tab-otp">
            <form action="{{ url_for('auth.login_send_otp') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control"
                           placeholder="you@example.com" required>
                </div>
                <label style="display:flex;align-items:center;gap:.5rem;color:var(--text-secondary);font-size:.85rem;margin-bottom:1.5rem;">
                    <input type="checkbox" name="remember" value="1"> Remember me for 30 days
                </label>
                <div class="cf-turnstile" data-sitekey="{{ config.TURNSTILE_SITE_KEY or '1x00000000000000000000AA' }}" style="margin-bottom: 1rem;"></div>
                <button type="submit" class="btn" style="width:100%;">Send OTP</button>
            </form>
        </div>

        <!-- Password Login -->
        <div class="auth-tab-content" id="tab-password">
            <form action="{{ url_for('auth.login_password') }}" method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" name="identifier" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Password" required>
                </div>
                <label style="display:flex;align-items:center;gap:.5rem;color:var(--text-secondary);font-size:.85rem;margin-bottom:.5rem;">
                    <input type="checkbox" name="remember" value="1"> Remember me for 30 days
                </label>
                <div style="text-align:right;margin-bottom:1.5rem;">
                    <a href="{{ url_for('auth.reset_request') }}" style="color:var(--accent-color);font-size:.85rem;">Forgot password?</a>
                </div>
                <div class="cf-turnstile" data-sitekey="{{ config.TURNSTILE_SITE_KEY or '1x00000000000000000000AA' }}" style="margin-bottom: 1rem;"></div>
                <button type="submit" class="btn" style="width:100%;">Sign In</button>
            </form>
        </div>

        <!-- Divider -->
        <div style="display:flex;align-items:center;text-align:center;margin:2rem 0;color:var(--text-3);font-size:0.85rem;">
            <hr style="flex:1;border:none;border-top:1px solid var(--border);">
            <span style="padding:0 10px;">or</span>
            <hr style="flex:1;border:none;border-top:1px solid var(--border);">
        </div>

        <!-- Social Login -->
        <div style="display:flex;flex-direction:column;gap:1rem;">
            <a href="{{ url_for('auth.google_login') }}" class="btn social-btn"><i class="fa-brands fa-google"></i> Continue with Google</a>
            <a href="{{ url_for('auth.facebook_login') }}" class="btn social-btn"><i class="fa-brands fa-facebook-f"></i> Continue with Facebook</a>
        </div>

        <p class="auth-switch" style="margin-top: 2rem;">Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.querySelectorAll('.auth-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
});
</script>
{% endblock %}
