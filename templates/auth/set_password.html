{% extends "base.html" %}
{% block title %}Set Password | ILLIYEEN{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card reveal">
        <div class="auth-logo">Illiyeen</div>
        <h1 class="auth-title">{% if mode == 'reset' %}New Password{% else %}Create Password{% endif %}</h1>
        <p class="auth-subtitle">For account: <strong>{{ phone }}</strong></p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>{% if mode == 'reset' %}New {% endif %}Password (min. 6 characters)</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Choose a password" minlength="6" required>
            </div>
            <button type="submit" class="btn" style="width:100%;margin-top:1rem;">
                {% if mode == 'reset' %}Update Password{% else %}Create Account{% endif %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
