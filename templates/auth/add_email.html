{% extends "base.html" %}
{% block title %}Add Email | alphatex{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card reveal">
        <div class="auth-logo"><a href="/" style="display:inline-flex;align-items:center;gap:.5rem;text-decoration:none;"><img src="/static/images/logo.webp" alt="alphatex" style="height:32px;width:auto;"><span style="font-family:Century Gothic,sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:.12em;color:var(--accent);">alphatex</span></a></div>
        <h1 class="auth-title">Account Created! 🎉</h1>
        <p class="auth-subtitle">Add your email for invoices & order updates (optional)</p>

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Email Address <span style="color:var(--text-secondary)">(optional)</span></label>
                <input type="email" name="email" class="form-control" placeholder="yourname@example.com">
            </div>
            <button type="submit" class="btn" style="width:100%;margin-top:1rem;">Save &amp; Continue</button>
        </form>
        <div style="text-align:center;margin-top:1.5rem;">
            <a href="{{ url_for('shop.index') }}" style="color:var(--text-secondary);font-size:.85rem;">Skip for now</a>
        </div>
    </div>
</div>
{% endblock %}
